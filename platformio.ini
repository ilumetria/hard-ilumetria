; PlatformIO Project Configuration File
;
; ESP32-S3 CAM + RC522 RFID/NFC Module
; Author: Adrian Nava
; Date: 2026-03-08

[env:esp32s3cam]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; Monitor serial speed
monitor_speed = 115200

; SPI library + MFRC522
lib_deps =
    miguelbalboa/MFRC522@^1.4.11

; Build flags for ESP32-S3
board_build.arduino.memory_type = qio_opi
build_flags =
    -DBOARD_HAS_PSRAM

; Upload settings (adjust port as needed)
; upload_port = COM3
; monitor_port = COM3
